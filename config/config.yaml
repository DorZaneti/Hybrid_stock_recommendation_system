  start_date: '2020-01-01'
  end_date: '2025-12-31'
  train_start_date: '2020-01-01'
  train_end_date: '2023-01-01'
features:
  rsi:
    window: 14
  momentum:
    window: 10
  moving_average:
    window: 20
  bollinger_bands:
    window: 20
    std_multiplier: 2
  macd:
    fast: 12
    slow: 26
    signal: 9
  atr:
    window: 14
  log_volume:
    window: 20
macro:
  enabled: true
  tickers:
    - "^VIX"
    - "^GSPC"
    - "^TNX"   # 10-Year US Treasury Yield — rate regime signal (tech anti-correlated with rising rates)
  vix_change_window: 5   # look-back for VIX momentum feature

similarity:
  base_ticker: MSFT
  num_similar_stocks: 10
  features:
  - RSI
  - Momentum
  - Moving_Average
  - Bollinger_Upper
  - Bollinger_Lower
  - Close
model:
  profile: default
  hidden_size: 100
  num_layers: 4
  dropout: 0.2
  sequence_length: 60
  learning_rate: 0.001
  learning_rate_single_feature: 0.002
  batch_size: 32
  num_epochs: 100
  num_epochs_single_feature: 30
  scheduler:
    step_size: 50
    gamma: 0.1
  transfer_learning:
    freeze_layers: 3
    pretrain_split: 0.8
  direction_loss_weight: 0.0
  small_overrides:
    hidden_size: 32
    num_layers: 2
    dropout: 0.15
target:
  type: direction
  horizon_days: 5
  relative: false  # true = peer-relative (needs uncorrelated stocks; false = absolute direction)
walk_forward:
  enabled: true
  window_days: 21
  stride_days: 21
  min_oos_days: 60
training:
  test_days: 5
  transfer_learning_split: 20
  validation_days: 120
  early_stopping:
    enabled: true
    patience: 10
    monitor: val_mse  # val_da (maximise directional accuracy) | val_mse (minimise loss, default)
  random_seed: 42
  device_priority:
  - mps
  - cuda
  - cpu
visualization:
  figure_size:
    width: 14
    height: 7
  plot_stocks:
  - UPS
  - KMB
  y_limit_bottom: 100
persistence:
  models_dir: ./saved_models
  save_best_only: true
logging:
  level: INFO
  format: '%(asctime)s - %(name)s - %(levelname)s - %(message)s'
  file: stock_prediction.log
  console_output: true
